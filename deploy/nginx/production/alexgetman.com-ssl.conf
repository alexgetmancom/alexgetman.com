server {
    listen 127.0.0.1:4443 ssl proxy_protocol;
    http2 on;
    server_name alexgetman.com www.alexgetman.com;

    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;

    ssl_certificate /etc/letsencrypt/live/alexgetman.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alexgetman.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:81;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}

