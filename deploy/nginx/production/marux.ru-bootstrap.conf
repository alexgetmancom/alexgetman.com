# One-time HTTP-01 bootstrap. It is deliberately not installed by CI: after the
# certificate exists, marux.ru.conf owns the port-80 virtual host.
server {
    listen 80;
    server_name marux.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/marux-acme;
    }

    location / {
        return 404;
    }
}
