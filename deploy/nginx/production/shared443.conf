stream {
    map $ssl_preread_server_name $shared443_backend {
        ialexey.ru ialexey_https;
        www.ialexey.ru ialexey_https;
        alexgetman.com ialexey_https;
        www.alexgetman.com ialexey_https;
        amnezia.ziix.ru ialexey_https;
        marux.ru marux_https;
        default ialexey_https;
    }

    upstream ialexey_https {
        server 127.0.0.1:4443;
    }

    upstream marux_https {
        server 127.0.0.1:4444;
    }

    server {
        listen 443;
        proxy_pass $shared443_backend;
        proxy_protocol on;
        ssl_preread on;
    }
}
