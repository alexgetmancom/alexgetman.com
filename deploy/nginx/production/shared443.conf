stream {
    map $ssl_preread_server_name $shared443_backend {
        alexgetman.com alexgetman_https;
        www.alexgetman.com alexgetman_https;
        amnezia.ziix.ru alexgetman_https;
        marux.ru marux_https;
        default alexgetman_https;
    }

    upstream alexgetman_https {
        server 127.0.0.1:4443;
    }

    upstream marux_https {
        server 127.0.0.1:4444;
    }

    server {
        listen 443;
        proxy_pass $shared443_backend;
        proxy_protocol on;
        ssl_preread on;
    }
}
