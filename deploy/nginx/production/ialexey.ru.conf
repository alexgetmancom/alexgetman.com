map $uri $link_header {
    "/"              "</.well-known/api-catalog>; rel=\"api-catalog\", </llms.txt>; rel=\"service-doc\"";
    "/index.html"     "</.well-known/api-catalog>; rel=\"api-catalog\", </llms.txt>; rel=\"service-doc\"";
    "/ru/"           "</.well-known/api-catalog>; rel=\"api-catalog\", </llms.txt>; rel=\"service-doc\"";
    "/ru/index.html"  "</.well-known/api-catalog>; rel=\"api-catalog\", </llms.txt>; rel=\"service-doc\"";
    default          "";
}

server {
    listen 80;
    server_name ialexey.ru www.ialexey.ru;
    add_header X-Robots-Tag "noindex, nofollow" always;
    return 410;
}

server {
    listen 80;
    server_name alexgetman.com www.alexgetman.com;
    return 301 https://alexgetman.com$request_uri;
}

server {
    listen 127.0.0.1:81;
    server_name ialexey.ru www.ialexey.ru;
    add_header X-Robots-Tag "noindex, nofollow" always;
    return 410;
}

server {
    listen 127.0.0.1:81;
    server_name alexgetman.com www.alexgetman.com;

    root /home/deploy/ialexey-web;
    index index.html;

    include mime.types;
    types {
        text/markdown md;
    }
    charset utf-8;

    location ^~ /zoom/webhook {
        proxy_pass http://127.0.0.1:8799;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location ^~ /tg-feed/webhook {
        proxy_pass http://127.0.0.1:8788;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location = /tg-feed/healthz {
        proxy_pass http://127.0.0.1:8788;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location = /stats {
        access_log off;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://127.0.0.1:8788;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location = /stats/pageview {
        access_log off;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://127.0.0.1:8788;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location = /pipeline-status {
        include /etc/nginx/snippets/alexgetman-command-center.conf;
    }

    location = /command-center {
        include /etc/nginx/snippets/alexgetman-command-center.conf;
    }

    location = /api/pipeline-status {
        include /etc/nginx/snippets/alexgetman-command-center.conf;
    }

    location = /api/command-center {
        include /etc/nginx/snippets/alexgetman-command-center.conf;
    }

    location = /api/ops-dashboard {
        include /etc/nginx/snippets/alexgetman-command-center.conf;
    }

    location = /api/command-center/action {
        include /etc/nginx/snippets/alexgetman-command-center.conf;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8788;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    include /etc/nginx/snippets/alexgetman-cache.conf;

    location ~ ^/posts/(.*)$ {
        return 301 https://alexgetman.com/ru/posts/$1;
    }

    location ~* \.md$ {
        proxy_pass http://127.0.0.1:8788;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location ~* \.well-known/(oauth-|openid-|api-catalog) {
        default_type application/json;
        charset utf-8;
        add_header Content-Type "application/json; charset=utf-8" always;
        try_files $uri =404;
    }

    location ^~ /maru-media/ {
        proxy_pass http://127.0.0.1:8789/;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location / {
        add_header Link $link_header always;

        if ($http_accept ~* "text/markdown") {
            rewrite ^/$ /index.md last;
            rewrite ^/ru/$ /ru/index.md last;
            rewrite ^/([0-9]+)/([^/]+)/?$ /$1/$2.md last;
            rewrite ^/ru/([0-9]+)/([^/]+)/?$ /ru/$1/$2.md last;
        }

        proxy_pass http://127.0.0.1:8788;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location @backend {
        proxy_pass http://127.0.0.1:8788;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }
}
