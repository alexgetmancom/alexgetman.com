server {
    listen 80;
    server_name marux.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/marux-acme;
    }

    location / {
        return 301 https://marux.ru$request_uri;
    }
}

server {
    listen 127.0.0.1:81;
    server_name marux.ru;

    add_header X-Robots-Tag "noindex, nofollow" always;

    location = /command-center {
        proxy_pass http://127.0.0.1:8789;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location = /api/command-center {
        proxy_pass http://127.0.0.1:8789;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location = /api/command-center/action {
        proxy_pass http://127.0.0.1:8789;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    # Meta needs this URL while importing a Reel. The endpoint resolves only a
    # Studio video asset and exposes neither the dashboard nor the API.
    location ^~ /media/video/asset/ {
        proxy_pass http://127.0.0.1:8789;
        include /etc/nginx/snippets/alexgetman-proxy-headers.conf;
    }

    location / {
        return 404;
    }
}
