name: maru

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/alexgetmancom/alexgetman-backend:latest}
    pull_policy: always
    container_name: maru-backend
    command: ["bun", "--smol", "/app/runtime/server.js"]
    restart: unless-stopped
    env_file:
      - ./secrets.env
    group_add:
      - "${BOT_API_GID:-101}"
    environment:
      STUDIO_CONFIG: /app/studio.yaml
      DATA_DIR: /data
      PIPELINE_DB: /data/pipeline.db
      MEDIA_CACHE_DIR: /data/media-cache
      VIDEO_MEDIA_DIR: /data/video-media
      TELEGRAM_API_BASE_URL: http://alexgetman-telegram-bot-api:8081
      ENABLE_BOT_POLLING: "true"
      ENABLE_WORKERS: "true"
      BIND_HOST: 0.0.0.0
      PORT: "8788"
    volumes:
      - ${MARU_STUDIO_CONFIG_FILE:-./studio.yaml}:/app/studio.yaml:ro
      - ./data:/data
      - ${MARU_MEDIA_CACHE_DIR_HOST:-./media-cache}:/data/media-cache
      - ${MARU_VIDEO_MEDIA_DIR_HOST:-./video-media}:/data/video-media
      - ${MARU_BOT_API_DATA_DIR:-/home/deploy/alexgetman-runtime/bot-api-data}:/var/lib/telegram-bot-api:ro
    ports:
      - "127.0.0.1:8789:8788"
    networks:
      - agent_default
    mem_limit: 512m
    cpus: 0.75
    pids_limit: 96

networks:
  agent_default:
    external: true
