name: maru

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/alexgetmancom/alexgetman-backend:latest}
    pull_policy: always
    container_name: maru-backend
    command: ["bun", "--smol", "/app/runtime/server.js"]
    restart: unless-stopped
    env_file:
      - ./secrets.env
    group_add:
      - "${BOT_API_GID:-101}"
    environment:
      STUDIO_CONFIG: /app/studio.yaml
      DATA_DIR: /data
      PIPELINE_DB: /data/pipeline.db
      MEDIA_CACHE_DIR: /data/media-cache
      VIDEO_MEDIA_DIR: /data/video-media
      # This is a media-only public endpoint for Meta to fetch Reels source
      # files. It does not enable the Maru site module.
      PUBLIC_BASE_URL: ${MARU_PUBLIC_BASE_URL:-https://alexgetman.com/maru-media}
      TRUSTED_CLIENT_IP_HEADER: x-real-ip
      TELEGRAM_API_BASE_URL: http://alexgetman-telegram-bot-api:8081
      ENABLE_BOT_POLLING: "true"
      ENABLE_WORKERS: "true"
      BIND_HOST: 0.0.0.0
      PORT: "8788"
    volumes:
      - ${MARU_STUDIO_CONFIG_FILE:-./studio.yaml}:/app/studio.yaml:ro
      - ./data:/data
      - ${MARU_MEDIA_CACHE_DIR_HOST:-./media-cache}:/data/media-cache
      - ${MARU_VIDEO_MEDIA_DIR_HOST:-./video-media}:/data/video-media
      - ${MARU_BOT_API_DATA_DIR:-/home/deploy/alexgetman-runtime/bot-api-data}:/var/lib/telegram-bot-api:ro
    ports:
      - "127.0.0.1:8789:8788"
    # The deploy agent remains host-private; this alias is required for the
    # Telegram promotion and rollback controls inside the Maru backend.
    extra_hosts:
      - "host.docker.internal:${DEPLOY_AGENT_HOST_GATEWAY:-host-gateway}"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8788/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - agent_default
    mem_limit: 512m
    cpus: 0.75
    pids_limit: 96

networks:
  agent_default:
    external: true
