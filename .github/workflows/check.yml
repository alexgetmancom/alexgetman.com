name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: TypeScript-only language gate
        run: bun run check:language
      - name: Typecheck
        run: bun run typecheck
      - name: Backend tests
        run: bun run test
      - name: Web production build
        run: bun run check:web
        env:
          CI: "true"
          DATA_DIR: apps/web/src/data
      - name: Backend bundle
        run: bun run --filter @alexgetman/backend build

  docker:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Build backend image
        run: docker build --build-arg GIT_REVISION=${GITHUB_SHA::7} -f apps/backend/Dockerfile -t alexgetman-backend:ci .
