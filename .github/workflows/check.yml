name: Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: DATA_DIR=apps/web/src/data npm run check:web

  posting:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/posting
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/posting/pyproject.toml
      - name: Install development dependencies
        run: python -m pip install --upgrade pip '.[dev]'
      - name: Run checks
        run: ./scripts/check
