name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          cache: true
      - name: Install
        run: bun install --frozen-lockfile
      - name: TypeScript-only language gate
        run: bun run check:language
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Dead-code report
        run: bun run knip
      - name: Backend tests
        run: bun run test
      - name: Web production build
        run: bun run check:web
        env:
          CI: "true"
          DATA_DIR: apps/web/src/data
      - name: Astro SSR bundle
        run: bun build apps/web/server.ts --outdir runtime --target bun

  docker:
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          cache: true
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Astro site and server runtime on host
        run: |
          bun run check:web
          bun build apps/web/server.ts --outdir runtime --target bun
        env:
          DATA_DIR: apps/web/src/data
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          target: app
          build-args: |
            BUILD_SOURCE=on-host
            GIT_REVISION=${{ github.sha }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/alexgetman-backend:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/alexgetman-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
