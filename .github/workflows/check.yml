name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          cache: true
      - name: Install
        run: bun install --frozen-lockfile
      - name: TypeScript-only language gate
        run: bun run check:language
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Dead-code report
        run: bun run knip
      - name: Backend tests
        run: bun run test
      - name: Web production build
        run: bun run check:web
        env:
          CI: "true"
          DATA_DIR: apps/web/src/data
      - name: Astro SSR bundle
        run: bun build apps/web/server.ts --outdir runtime --target bun
