name: Remote Docker Prune
on:
  push:
    branches: [main]
jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      - name: Configure known hosts
        env:
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Clean Docker Disk
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "=== BEFORE PRUNE ==="
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "df -h && docker system df" || true
          echo "=== RUNNING PRUNE ==="
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "docker system prune -a -f --volumes" || true
          echo "=== AFTER PRUNE ==="
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "df -h && docker system df" || true
