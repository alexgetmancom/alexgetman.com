name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read
  packages: write
  statuses: write

jobs:
  docker:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.image.outputs.digest }}
      release_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish backend image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          target: app
          build-args: |
            BUILD_SOURCE=in-docker
            GIT_REVISION=${{ github.event.workflow_run.head_sha }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/alexgetman-backend:${{ github.event.workflow_run.head_sha }},ghcr.io/${{ github.repository_owner }}/alexgetman-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy immutable image
    needs: docker
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.docker.outputs.release_sha }}
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      - name: Configure known hosts
        env:
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Activate image and verify readiness
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_AGENT_TOKEN: ${{ secrets.DEPLOY_AGENT_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/alexgetman-backend@${{ needs.docker.outputs.image_digest }}
          RELEASE: ${{ needs.docker.outputs.release_sha }}
          MARU_DEPLOY_ENABLED: ${{ vars.MARU_DEPLOY_ENABLED }}
        run: |
          test -n "$DEPLOY_HOST" && test -n "$DEPLOY_USER" && test -n "$DEPLOY_AGENT_TOKEN"
          runtime=/home/deploy/alexgetman-runtime
          scp -o BatchMode=yes apps/backend/compose.yaml "$DEPLOY_USER@$DEPLOY_HOST:$runtime/compose.yaml.next"
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "set -e; docker compose --env-file $runtime/deploy-image.env -f $runtime/compose.yaml.next config --quiet; mv $runtime/compose.yaml.next $runtime/compose.yaml"
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "set -e; runtime=$runtime; image=\$(bun -e 'const state=JSON.parse(await Bun.file(\"/var/lib/alexgetman-deploy/state.json\").text()); process.stdout.write(state.current?.image ?? \"\")'); printf '%s\\n' \"\$image\" | grep -Eq '^ghcr.io/alexgetmancom/alexgetman-backend@sha256:[0-9a-fA-F]{64}\$' || exit 1; if ! grep -Eq '^BACKEND_IMAGE=ghcr.io/alexgetmancom/alexgetman-backend@sha256:[0-9a-fA-F]{64}\$' \"\$runtime/deploy-image.env\"; then tmp=\"\$runtime/deploy-image.env.next\"; { grep -v '^BACKEND_IMAGE=' \"\$runtime/deploy-image.env\" || true; printf 'BACKEND_IMAGE=%s\\n' \"\$image\"; } > \"\$tmp\"; mv \"\$tmp\" \"\$runtime/deploy-image.env\"; fi"
          if [ "$MARU_DEPLOY_ENABLED" = "true" ]; then
            maru_runtime=/home/deploy/maru
            ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "set -e; runtime=$maru_runtime; image_id=\$(docker inspect --format '{{.Image}}' maru-backend); image=\$(docker image inspect --format '{{index .RepoDigests 0}}' \"\$image_id\"); printf '%s\\n' \"\$image\" | grep -Eq '^ghcr.io/alexgetmancom/alexgetman-backend@sha256:[0-9a-fA-F]{64}\$' || exit 1; if ! grep -Eq '^BACKEND_IMAGE=ghcr.io/alexgetmancom/alexgetman-backend@sha256:[0-9a-fA-F]{64}\$' \"\$runtime/deploy-image.env\" 2>/dev/null; then tmp=\"\$runtime/deploy-image.env.next\"; { grep -v '^BACKEND_IMAGE=' \"\$runtime/deploy-image.env\" 2>/dev/null || true; printf 'BACKEND_IMAGE=%s\\n' \"\$image\"; } > \"\$tmp\"; mv \"\$tmp\" \"\$runtime/deploy-image.env\"; fi"
            scp -o BatchMode=yes deploy/maru.compose.yaml "$DEPLOY_USER@$DEPLOY_HOST:$maru_runtime/maru.compose.yaml.next"
            ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "set -e; runtime=$maru_runtime; docker compose --env-file \$runtime/deploy-image.env -f \$runtime/maru.compose.yaml.next config --quiet; mv \$runtime/maru.compose.yaml.next \$runtime/maru.compose.yaml"
          fi
          # This is the active Alex/Maru edge topology, not an optional
          # example. Install it before each backend activation, validate it,
          # then reload only after nginx accepts the complete configuration.
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "install -d $runtime/nginx/production"
          scp -o BatchMode=yes deploy/nginx/production/shared443.conf "$DEPLOY_USER@$DEPLOY_HOST:$runtime/nginx/production/shared443.conf"
          scp -o BatchMode=yes deploy/nginx/production/marux.ru-ssl.conf "$DEPLOY_USER@$DEPLOY_HOST:$runtime/nginx/production/marux.ru-ssl.conf"
          scp -o BatchMode=yes deploy/nginx/production/marux.ru.conf "$DEPLOY_USER@$DEPLOY_HOST:$runtime/nginx/production/marux.ru.conf"
          scp -o BatchMode=yes deploy/nginx/production/ialexey.ru-ssl.conf "$DEPLOY_USER@$DEPLOY_HOST:$runtime/nginx/production/ialexey.ru-ssl.conf"
          scp -o BatchMode=yes deploy/nginx/production/ialexey.ru.conf "$DEPLOY_USER@$DEPLOY_HOST:$runtime/nginx/production/ialexey.ru.conf"
          scp -o BatchMode=yes deploy/nginx/production/alexgetman-proxy-headers.conf "$DEPLOY_USER@$DEPLOY_HOST:$runtime/nginx/production/alexgetman-proxy-headers.conf"
          scp -o BatchMode=yes deploy/nginx/production/alexgetman-cache.conf "$DEPLOY_USER@$DEPLOY_HOST:$runtime/nginx/production/alexgetman-cache.conf"
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "set -e; sudo install -d -m 0755 /etc/nginx/snippets; sudo install -m 0644 $runtime/nginx/production/shared443.conf /etc/nginx/stream-conf.d/shared443.conf; sudo install -m 0644 $runtime/nginx/production/marux.ru-ssl.conf /etc/nginx/sites-enabled/marux.ru-ssl; sudo install -m 0644 $runtime/nginx/production/marux.ru.conf /etc/nginx/sites-enabled/marux.ru; sudo rm -f /etc/nginx/sites-enabled/marux.ru-bootstrap; sudo install -m 0644 $runtime/nginx/production/ialexey.ru-ssl.conf /etc/nginx/sites-enabled/ialexey.ru-ssl; sudo install -m 0644 $runtime/nginx/production/ialexey.ru.conf /etc/nginx/sites-enabled/ialexey.ru; sudo install -m 0644 $runtime/nginx/production/alexgetman-proxy-headers.conf /etc/nginx/snippets/alexgetman-proxy-headers.conf; sudo install -m 0644 $runtime/nginx/production/alexgetman-cache.conf /etc/nginx/snippets/alexgetman-cache.conf; sudo nginx -t; sudo systemctl reload nginx"
          # Only alex auto-deploys. Every other configured target (maru) is
          # promoted manually from Telegram, via the button the deploy agent
          # attaches to this success notification, once alex is proven healthy.
          payload=$(printf '{"image":"%s","release":"%s"}' "$IMAGE" "$RELEASE")
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "curl --fail-with-body --silent --show-error --retry 2 --retry-all-errors -H 'Authorization: Bearer $DEPLOY_AGENT_TOKEN' -H 'Content-Type: application/json' --data '$payload' http://127.0.0.1:9899/v1/deploy"
          curl --fail --silent --show-error --retry 3 --retry-all-errors https://alexgetman.com/readyz
          # Maru isn't redeployed here, but it shares the nginx config just
          # reloaded above, so a smoke check catches collateral breakage.
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "curl --fail --silent --show-error --retry 3 --retry-all-errors http://127.0.0.1:8789/readyz"
          # Keep only layers used by running containers. Volumes are deliberately
          # excluded: they can contain persistent production data.
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" "set -e; docker image prune --all --force; docker builder prune --all --force"

  deployment-status:
    name: Production deployment status
    needs: [docker, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish final production status
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ "$DOCKER_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            state=success
            description='Image activated and production readiness passed'
          else
            state=failure
            description='Docker build or production deployment failed'
          fi
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state="$state" \
            -f context='production deployment' \
            -f description="$description" \
            -f target_url="$TARGET_URL"
