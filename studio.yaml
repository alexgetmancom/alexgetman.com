# User-facing feature selection. Secrets always live in an ignored .env file.
# IANA zone used for every displayed schedule time; timezone_label is the short
# suffix shown next to it (e.g. "18:30 MSK").
timezone: Europe/Moscow
timezone_label: MSK

modules:
  site: true
  text_posting: true
  video_posting: false
  youtube: false
  instagram: false
  analytics: true

analytics:
  # The primary analytics card for this Studio. Maru uses "video".
  default_tab: posts

video:
  prepare_lead_minutes: 15
  reminder_minutes: 5
  retention_hours: 24

command_center:
  default_mode: posts
