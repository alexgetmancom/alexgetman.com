name: ${PROJECT_NAME:-alexgetman}-backend

services:
  bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: alexgetman-telegram-bot-api
    restart: unless-stopped
    env_file:
      - ./telegram-bot-api.env
    environment:
      TELEGRAM_LOCAL: "1"
      TELEGRAM_WORK_DIR: /var/lib/telegram-bot-api
      TELEGRAM_TEMP_DIR: /tmp/telegram-bot-api
    volumes:
      - ./bot-api-data:/var/lib/telegram-bot-api
      - ./bot-api-temp:/tmp/telegram-bot-api
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - agent_default

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/alexgetmancom/alexgetman-backend:latest}
    pull_policy: always
    container_name: alexgetman-backend
    command: ["bun", "--smol", "/app/runtime/server.js"]
    restart: unless-stopped
    env_file:
      - path: ./secrets.env
      - path: ./site-feed.env
        required: false
    group_add:
      - "${BOT_API_GID:-101}"
    depends_on:
      - bot-api
    environment:
      DATA_DIR: /data
      STUDIO_CONFIG: /app/studio.yaml
      PIPELINE_DB: /data/pipeline.db
      FEED_JSON: /data/feed.json
      SITE_METRICS_JSON: /data/metrics.json
      SITE_CONTENT_METRICS_JSON: /data/content-metrics.json
      TRUSTED_CLIENT_IP_HEADER: x-real-ip
      SITE_PUBLIC_DIR: /data/site
      CHANNEL_USERNAME: alexgetmancom
      METRICS_REFRESH_INTERVAL_SECONDS: "10"
      PIPELINE_BASELINE_MESSAGE_ID: "422"
      IDLE_POLL_INTERVAL_SECONDS: "5"
      TELEGRAM_API_BASE_URL: http://bot-api:8081
      COMMAND_CENTER_URL: https://alexgetman.com/command-center
      OBSERVABILITY_INTERVAL_SECONDS: "300"
      REMOTE_MEDIA_PATH: /media/threads
      PUBLIC_MEDIA_BASE_URL: https://alexgetman.com/media/threads
      MEDIA_CACHE_DIR: /data/media-cache
      VIDEO_MEDIA_DIR: /data/video-media
      ENABLE_BOT_POLLING: "true"
      ENABLE_TELEGRAM_STORIES: "true"
      BIND_HOST: 0.0.0.0
      PORT: "8788"
    volumes:
      - ${STUDIO_CONFIG_FILE:-./studio.yaml}:/app/studio.yaml:ro
      - ./data:/data
      - ${ALEX_MEDIA_CACHE_DIR_HOST:-./media-cache}:/data/media-cache
      - ${ALEX_VIDEO_MEDIA_DIR_HOST:-./video-media}:/data/video-media
      - ./bot-api-data:/var/lib/telegram-bot-api:ro
      - ${ALEX_THREADS_MEDIA_DIR_HOST:-/home/deploy/ialexey-web/media/threads}:/media/threads
      - ${ALEX_SITE_MEDIA_DIR_HOST:-/home/deploy/ialexey-web/media}:/data/site/media
    ports:
      - "127.0.0.1:8788:8788"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8788/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - agent_default
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 96

networks:
  agent_default:
    external: true
