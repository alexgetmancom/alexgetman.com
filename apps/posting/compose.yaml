name: alexgetman-posting

services:
  bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: alexgetman-telegram-bot-api
    restart: unless-stopped
    env_file:
      - ./telegram-bot-api.env
    environment:
      TELEGRAM_LOCAL: "1"
      TELEGRAM_WORK_DIR: /var/lib/telegram-bot-api
      TELEGRAM_TEMP_DIR: /tmp/telegram-bot-api
    volumes:
      - ./bot-api-data:/var/lib/telegram-bot-api
      - ./bot-api-temp:/tmp/telegram-bot-api
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - agent_default

  posting-app:
    build:
      context: .
      dockerfile: posting/Dockerfile
    image: alexgetman-posting:latest
    container_name: alexgetman-posting-app
    restart: unless-stopped
    env_file:
      - ./secrets.env
    depends_on:
      - bot-api
    environment:
      DATA_DIR: /data
      PIPELINE_DB: /data/pipeline.db
      FEED_JSON: /feed-data/feed.json
      SITE_METRICS_JSON: /feed-data/metrics.json
      CHANNEL_USERNAME: alexgetmancom
      METRICS_REFRESH_INTERVAL_SECONDS: "300"
      PIPELINE_BASELINE_MESSAGE_ID: "422"
      EN_TRANSLATION_WAIT_SECONDS: "90"
      EN_TRANSLATION_POLL_SECONDS: "3"
      IDLE_POLL_INTERVAL_SECONDS: "5"
      REMOTE_MEDIA_PATH: /media/threads/
      TELEGRAM_API_BASE_URL: http://bot-api:8081
      COMMAND_CENTER_URL: https://alexgetman.com/command-center
      OBSERVABILITY_INTERVAL_SECONDS: "300"
    command: ["python", "-u", "/app/app.py"]
    volumes:
      - ./data:/data
      - ./bot-api-data:/var/lib/telegram-bot-api:ro
      - /home/deploy/ialexey-web/media/threads:/media/threads
      - /home/deploy/ialexey-feed/data:/feed-data:ro
    networks:
      - agent_default
    mem_limit: 1536m
    pids_limit: 192

  site-feed:
    build:
      context: .
      dockerfile: site-feed/Dockerfile
    image: alexgetman-site-feed:latest
    container_name: alexgetman-site-feed
    restart: unless-stopped
    user: "1000:1000"
    group_add:
      - "101"
    env_file:
      - ./site-feed.env
    environment:
      DATA_DIR: /feed-data
      PIPELINE_DB: /data/pipeline.db
      TELEGRAM_API_BASE_URL: http://bot-api:8081
      BIND_HOST: 0.0.0.0
      PIPELINE_BASELINE_MESSAGE_ID: "422"
    command: ["python3", "-u", "/app/fastapi_app.py", "serve"]
    depends_on:
      - bot-api
    volumes:
      - ./data:/data
      - ./bot-api-data:/var/lib/telegram-bot-api:ro
      - /home/deploy/ialexey-feed/data:/feed-data
      - /home/deploy/repos/ialexey-web:/home/deploy/repos/ialexey-web
      - /home/deploy/ialexey-web:/home/deploy/ialexey-web
    ports:
      - "127.0.0.1:8788:8788"
    networks:
      - agent_default
    mem_limit: 1024m
    pids_limit: 128

networks:
  agent_default:
    external: true
